spring:
  datasource:
    url: #URL do banco de dados
    username: #username
    password: #senha
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 600000
      pool-name: HikariCP
  jpa:
    hibernate:
      ddl-auto: update
      properties:
        hibernate:
          format_sql: true
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoint:
    info:
      enabled: true

server:
    port: 8082

